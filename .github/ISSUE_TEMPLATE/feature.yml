name: Feature request
description: Propose a focused HIDloom improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem to solve
      description: Describe the user need rather than only a preferred implementation.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
    validations:
      required: true
  - type: dropdown
    id: runtime
    attributes:
      label: Runtime scope
      options:
        - Raspberry Pi OS only
        - Buildroot appliance only
        - Shared by both
        - Development or release tooling
    validations:
      required: true
  - type: textarea
    id: compatibility
    attributes:
      label: Compatibility impact
      description: Consider keymap schema, Vial, USB identity, package/service IDs, startup time, size, and rollback.
  - type: checkboxes
    id: terms
    attributes:
      label: Submission check
      options:
        - label: This request contains no credentials, private device details, or embargoed security information.
          required: true
