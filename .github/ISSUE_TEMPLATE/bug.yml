name: Bug report
description: Report a reproducible HIDloom defect
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Do not include credentials, private addresses, personal paths, or unredacted logs. Use SECURITY.md for vulnerabilities.
  - type: input
    id: version
    attributes:
      label: Revision or version
      description: Commit, package version, image checksum, or release tag.
    validations:
      required: true
  - type: dropdown
    id: runtime
    attributes:
      label: Runtime
      options:
        - Raspberry Pi OS
        - Buildroot appliance
        - Both
        - Development host only
    validations:
      required: true
  - type: input
    id: profile
    attributes:
      label: Device profile and host OS
      placeholder: cqa02303v5 / Windows 11
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction and sanitized evidence
      description: Include commands, pass/fail results, and rollback state where applicable.
    validations:
      required: true
  - type: checkboxes
    id: safety
    attributes:
      label: Safety check
      options:
        - label: I removed credentials, private addresses, personal paths, serials, and key material.
          required: true
