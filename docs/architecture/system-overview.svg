  <path class="arrow-orange" d="M1055 523 L1055 545"/>
  <path class="arrow-orange" d="M1055 579 L1055 620"/>
  <text class="tiny" x="1080" y="548">32B request / response</text>

  <path class="arrow-green" d="M350 338 C430 338, 455 558, 500 586"/>
  <path class="arrow-green" d="M350 450 C430 450, 455 610, 500 630"/>
  <path class="arrow-green" d="M350 558 C430 558, 455 725, 500 789"/>
  <path class="arrow-green" d="M610 522 C560 522, 540 505, 640 491"/>
  <text class="tiny" x="370" y="390">control plane APIs</text>

  <path class="arrow-green" d="M780 620 C840 620, 870 465, 930 465"/>
  <path class="arrow-green" d="M930 455 C850 445, 820 535, 800 522"/>
  <text class="tiny" x="805" y="426">SET keymap / RGB / matrix state</text>

  <path class="arrow-green" d="M780 630 C850 650, 870 650, 930 658"/>
  <path class="arrow-green" d="M1180 658 C1230 658, 1250 682, 1295 681"/>

  <path class="arrow-green" d="M780 652 C850 720, 870 770, 930 773"/>
  <path class="arrow-green" d="M1180 773 C1230 773, 1250 800, 1295 801"/>

  <path class="arrow-blue dashed" d="M780 652 C860 800, 875 880, 930 888"/>
  <path class="arrow-blue" d="M1180 888 C1230 888, 1250 918, 1295 918"/>

  <path class="arrow" d="M640 491 L640 530"/>
  <text class="tiny" x="650" y="517">delegated actions</text>

  <path class="arrow-green dashed" d="M640 720 L640 750"/>
  <path class="arrow-green dashed" d="M640 828 L640 855"/>

  <rect class="ipc" x="900" y="1090" width="590" height="44"/>
  <text class="small" x="925" y="1117">Legacy Python usbd.service is normally inactive; hidloom-outputd routes core frames to hidloom-hidd (USB) or hidloom-uidd (Pi console).</text>
</svg>
